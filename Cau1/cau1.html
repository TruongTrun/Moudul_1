<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    

   <script>

   function isPrime(num) {
       if (num <= 1) return false;
       if (num <= 3) return true;
       if (num % 2 === 0 || num % 3 === 0) return false;
       let i = 5;
       while (i * i <= num) {
           if (num % i === 0 || num % (i + 2) === 0) return false;
           i= i+6;
       }
       return true;
   }

   function getPrimeNumbersFromArray(arr) {
       let primeNumbers = [];
       for (let i = 0; i < arr.length; i++) {
           if (isPrime(arr[i])) {
               primeNumbers.push(arr[i]);
           }
       }
       return primeNumbers;
   }

   function main() {
       let n = parseInt(prompt("Nhập số phần tử của mảng: "));
       let arr = [];
       for (let i = 0; i < n; i++) {
           arr.push(parseInt(prompt("Nhập phần tử thứ " + (i + 1) + ": ")));
      }
    
       console.log("Mảng vừa nhập vào là: " + arr.join(", "));
    
       let primeNumbers = getPrimeNumbersFromArray(arr);
       console.log("Các số nguyên tố trong mảng là: " + primeNumbers.join(", "));
   }

   main();

 

   </script>


</body>
</html>
